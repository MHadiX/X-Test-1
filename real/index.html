<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X GROUP CORE</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="cyber-panel" style="border-top-color: #ff2a4b;">
        <h2 style="color: #ff2a4b;">TERMINAL UNLOCKED</h2>
        <p>Congratulations. You found the core directory.</p>
        <p>Enter your exact name to log your completion.</p>
        
        <input type="text" id="nameInput" placeholder="ENTER YOUR NAME">
        
        <button style="border-color: #ff2a4b; color: white;" onclick="submitFlag()">SUBMIT FLAG</button>
    </div>

    <script>
        async function submitFlag() {
            // Grab the name input
            const name = document.getElementById('nameInput').value.trim();
            
            // Validate input
            if (!name) {
                alert("Error: Please enter your name.");
                return;
            }

            // Capture the exact time from their machine
            const timestamp = new Date().toLocaleString();

            // Your live Discord Webhook URL
            const webhookUrl = "https://discord.com/api/webhooks/1480232689196994664/zcw6SHDdWVtI_YYQEDpXRKU_AmPkFMZA8cYAbU_WzebrhDQdltO6hJnKaER_LoCvWszE"; 

            // Build Payload for Discord (Only Name and Time)
            const payload = {
                content: "🚩 **New Flag Captured!**",
                embeds: [{
                    title: "Core Admin Panel Breached",
                    color: 65280, // Green
                    fields: [
                        { name: "Operator Name", value: name, inline: true },
                        { name: "Time Completed", value: timestamp, inline: true }
                    ],
                    footer: { text: "X Group Digital Logging System" }
                }]
            };

            // Send to Discord
            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                alert("Success: Flag accepted. Your completion has been logged to the server.");
                
                // Clear the input so they can't spam it easily
                document.getElementById('nameInput').value = ''; 

            } catch (error) {
                console.error("Webhook connection error.", error);
                alert("System Error: Could not reach the logging server.");
            }
        }
    </script>
</body>
</html>
